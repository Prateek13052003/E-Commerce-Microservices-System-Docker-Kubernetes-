apiVersion: v1
kind: Service
metadata:
  name: mongo-users
  namespace: ecommerce
spec:
  ports:
    - port: 27017
  selector:
    app: mongo-users

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-users
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-users
  template:
    metadata:
      labels:
        app: mongo-users
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
